name: Build & Release APK

on:
  push:
    tags:
      - 'v*'   # v1.0.0, v1.2.3 gibi tag'lerde çalışır

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle önbelleği
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}

      - name: Kalıcı Keystore Oluştur ve Kaydet (Yoksa)
        run: |
          if [ ! -f "android/app/cami-tv.keystore" ]; then
            echo "Kalıcı Keystore dosyası bulunamadı! Yeni bir tane oluşturuluyor..."
            keytool -genkeypair -v -storetype PKCS12 -keystore android/app/cami-tv.keystore -alias camitv -keyalg RSA -keysize 2048 -validity 10000 -storepass camitv123 -keypass camitv123 -dname "CN=CamiTV, OU=IT, O=AkilliCami, L=Istanbul, S=Istanbul, C=TR"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/cami-tv.keystore
            git commit -m "chore: OTA guncellemeleri icin kalici Android Keystore olusturuldu"
            git push origin HEAD:master
          fi

      - name: APK derle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: APK dosyasını bul
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*-release.apk" -o -name "*-unsigned.apk" | head -1)
          if [ -z "$APK" ]; then
             APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          # Sürüm adını tag'den al (v1.2.3 → 1.2.3)
          VERSION=${GITHUB_REF_NAME#v}
          NEW_NAME="cami-tv-${VERSION}.apk"
          cp "$APK" "$NEW_NAME"
          echo "name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: GitHub Release oluştur ve APK yükle
        uses: softprops/action-gh-release@v2
        with:
          name: "Cami TV ${{ github.ref_name }}"
          body: |
            ## 🕌 Cami TV ${{ github.ref_name }}

            ### Kurulum
            1. APK dosyasını indirin
            2. Android TV / Fire Stick'e yükleyin

            ### Değişiklikler
            Bkz. [CHANGELOG.md](https://github.com/TA1GI/cami-tv/blob/master/CHANGELOG.md)
          files: ${{ steps.apk.outputs.name }}
          draft: false
          prerelease: false
